<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthcare Portal - Login</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-graphic">
            <img src="../images/hero.png" alt="Digital Healthcare Abstract" class="auth-graphic-img">
            <div class="auth-graphic-overlay"></div>
            <div class="auth-headline glass-container">
                <h1>Healthcare<br>Portal</h1>
                <p>Welcome to the future of medical appointments.</p>
            </div>
        </div>

        <div class="auth-form-container">
            <div class="auth-card glass-container">
                <h2>Welcome Back</h2>
                <p class="subtitle">Securely sign in to your healthcare profile.</p>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your email" />
                </div>
                
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" />
                </div>

                <button class="btn-primary" onclick="login()">Log In Securely</button>

                <p class="text-center" style="margin-top: 1rem;">
                    Don't have an account? <a href="register.html">Register here</a>
                </p>
                
                <div id="errorMsg" class="status-msg error-msg" style="margin-top: 1rem; display: none;"></div>
            </div>
        </div>
    </div>

    <script src="../js/api.js?v=5"></script>
    <script src="../js/auth.js?v=5"></script>
    <script>
        // Slightly update the display of errors to handle display:none toggling
        const originalLogin = login;
        window.login = async function() {
            const errorMsg = document.getElementById("errorMsg");
            errorMsg.style.display = 'none';
            errorMsg.classList.remove('show');
            
            // Watch changes in auth.js logic - intercepting the error assignment to show the box
            const observer = new MutationObserver((mutations) => {
                mutations.forEach((mutation) => {
                    if (mutation.type === 'childList') {
                        if (errorMsg.textContent.trim() !== "") {
                            errorMsg.style.display = 'flex';
                            setTimeout(() => errorMsg.classList.add('show'), 10);
                        } else {
                            errorMsg.style.display = 'none';
                            errorMsg.classList.remove('show');
                        }
                    }
                });
            });
            observer.observe(errorMsg, { childList: true });
            
            await originalLogin();
        };

        // Pre-fill email from registration if available
        document.addEventListener("DOMContentLoaded", () => {
            const params = new URLSearchParams(window.location.search);
            const passedEmail = params.get("email");
            if (passedEmail) {
                const emailInput = document.getElementById("email");
                if (emailInput) {
                    emailInput.value = passedEmail;
                }
            }
        });
    </script>
</body>
</html>
